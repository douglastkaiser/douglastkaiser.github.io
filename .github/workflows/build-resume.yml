name: Build and Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'resume/**'
      - 'assets/**'
      - '.github/workflows/build-resume.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build resume PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: resume

      - name: Stage site for artifact upload
        run: |
          mkdir -p dist
          rsync -a --exclude '.git' --exclude 'dist' ./ dist/
          mkdir -p dist/assets
          cp resume/resume.pdf dist/assets/resume.pdf

      - name: Assert staged artifact contains site root and resume
        run: |
          test -f dist/index.html
          test -f dist/assets/resume.pdf

      - name: Show staged artifact contents
        run: |
          echo "Top-level artifact entries:"
          ls -la dist | sed -n '1,40p'
          echo
          echo "Assets entries (truncated):"
          ls -la dist/assets | sed -n '1,60p'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  post_deploy_smoke_check:
    name: Post-deploy smoke check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Verify resume PDF endpoint and headers
        run: |
          set -euo pipefail

          URL="https://www.douglastkaiser.com/assets/resume.pdf"
          HEADER_FILE="$(mktemp)"

          echo "Checking: ${URL}"
          STATUS_CODE="$(curl -sS -L -o /dev/null -D "$HEADER_FILE" -w "%{http_code}" "$URL")"
          CONTENT_TYPE="$(awk 'BEGIN{IGNORECASE=1} /^content-type:/{sub(/\r$/, "", $0); sub(/^content-type:[[:space:]]*/, "", $0); print tolower($0); exit}' "$HEADER_FILE")"

          echo "HTTP status: ${STATUS_CODE}"
          echo "Content-Type: ${CONTENT_TYPE}"

          test "${STATUS_CODE}" = "200"
          test "${CONTENT_TYPE}" = "application/pdf"

      - name: Confirm endpoint is not a 404 page
        run: |
          set -euo pipefail

          URL="https://www.douglastkaiser.com/assets/resume.pdf"
          BODY_FILE="$(mktemp)"

          curl -sS -L "$URL" -o "$BODY_FILE"

          FILE_TYPE="$(file -b --mime-type "$BODY_FILE")"
          echo "Downloaded MIME type: ${FILE_TYPE}"

          test "${FILE_TYPE}" = "application/pdf"
